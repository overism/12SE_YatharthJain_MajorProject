<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Calendar - Dusty</title>
    <link rel="icon" href="{{ url_for('static', filename='images/mainicon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}">
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css' rel='stylesheet' />
</head>
<body>
    <sidebar class="sidebar" role="banner">
        <a class="brand" href="{{ url_for('home') }}" aria-label="Dusty home">
            <img src="{{ url_for('static', filename='images/transp512.png') }}" alt="Dusty logo">
        </a>
        <nav class="nav" role="navigation">
            <a class="btn btn-ghost" href="{{ url_for('home') }}">Dashboard</a>
            <a class="btn btn-active" href="{{ url_for('calendar') }}">Smart Calendar</a>
            <a class="btn btn-ghost" href="{{ url_for('tasks') }}">Tasks</a>
            <a class="btn btn-ghost" href="{{ url_for('timer') }}">Study Timer</a>
            <a class="btn btn-ghost" href="{{ url_for('chat') }}">AI Assistant</a>
            <a class="btn btn-ghost" href="{{ url_for('flashcards') }}">Flashcards</a>
            <a class="btn btn-ghost" href="{{ url_for('progress') }}">Progress</a>
            <a class="btn btn-ghost" href="{{ url_for('resources') }}">Resources</a>
        </nav>
    </sidebar>

    <!-- Calendar Loading Screen -->
    <div class="page-loading" id="calendar-loading">
        <div class="page-loading-content">
            <div class="page-loading-icon">
                <img src="{{ url_for('static', filename='images/calendar-icon.svg') }}" alt="Calendar icon" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjYwIiBoZWlnaHQ9IjYwIiB4PSIxMCIgeT0iMTUiIHJ4PSI4IiBmaWxsPSIjZjFhNDVjIiBzdHJva2U9IiNmZmZmZmYiIHN0cm9rZS13aWR0aD0iMiIvPgo8cGF0aCBkPSJNMjAgMzBMMzAgMjBMMzAgMzBMMjAgMzBaTTUwIDMwTDYwIDIwTDYwIDMwTDUwIDMwWiIgc3Ryb2tlPSIjZmZmZmZmIiBzdHJva2Utd2lkdGg9IjIiIGZpbGw9Im5vbmUiLz4KPHJlY3QgeD0iMTUiIHk9IjM1IiB3aWR0aD0iNTAiIGhlaWdodD0iMyIgcng9IjEiIGZpbGw9IiNmZmZmZmYiLz4KPHJlY3QgeD0iMTUiIHk9IjQwIiB3aWR0aD0iMzAiIGhlaWdodD0iMyIgcng9IjEiIGZpbGw9IiNmZmZmZmYiLz4KPHJlY3QgeD0iMTUiIHk9IjQ1IiB3aWR0aD0iNDAiIGhlaWdodD0iMyIgcng9IjEiIGZpbGw9IiNmZmZmZmYiLz4KPC9zdmc+';">
            </div>
            <h2 class="page-loading-title">Loading Calendar</h2>
            <p class="page-loading-subtitle">Fetching your events and schedule...</p>
            <div class="page-loading-progress">
                <div class="page-loading-progress-bar"></div>
            </div>
        </div>
    </div>

    <main class="calendar-container">
        <div class="calendar-header">
            <h1 class="calendar-title">Smart Calendar</h1>
            <div class="calendar-controls">
                <button class="btn btn-secondary" id="newEventBtn">+ New Event</button>
                <button class="btn btn-primary" id="generateBtn">Generate Schedule</button>
                <button class="btn btn-ghost" id="syncBtn" style="display:none;">Sync Google Calendar</button>
                <button class="btn btn-ghost" id="connectGoogleBtn" style="display:none;">🔗 Connect Google Calendar</button>
            </div>
        </div>

        <div class="calendar-wrapper">
            <div id="calendar"></div>
        </div>
    </main>

    <!-- Status Notification Popup -->
    <div id="status" class="status"></div>

    <!-- Event Form Modal -->
    <div id="eventForm" class="event-form">
        <div class="event-form-content">
            <button class="close-btn" onclick="closeEventForm()">&times;</button>
            <h2 class="event-title" id="eventFormTitle">New Event</h2>

            <form id="eventFormData">
                <div class="form-group">
                    <label for="eventTitle">Title *</label>
                    <input type="text" id="eventTitle" required placeholder="Enter event title">
                </div>

                <div class="form-group">
                    <label for="eventDescription">Description</label>
                    <textarea id="eventDescription" rows="3" placeholder="Enter event description"></textarea>
                </div>

                <div class="form-group">
                    <label for="eventStart">Start Time *</label>
                    <input type="datetime-local" id="eventStart" required>
                </div>

                <div class="form-group">
                    <label for="eventEnd">End Time *</label>
                    <input type="datetime-local" id="eventEnd" required>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeEventForm()">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveEvent()">Save Event</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteEvent()" style="display:none;">Delete</button>
                </div>
            </form>
        </div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(() => console.log('SW registered'))
                .catch(err => console.error('SW failed', err));
        }

        let calendar;
        let currentEventId = null;
        let currentEvent = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Show loading screen initially
            const loadingScreen = document.getElementById('calendar-loading');
            if (loadingScreen) {
                loadingScreen.classList.remove('is-hidden');
            }

            // Check if user just connected Google Calendar
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('google_connected') === 'true') {
                showStatus('✅ Google Calendar connected successfully! 🎉 Syncing events...', 'success');
                // Clear the URL parameter
                window.history.replaceState({}, document.title, '/calendar');
                // Auto-sync after a short delay
                setTimeout(() => {
                    syncGoogleCalendar();
                }, 500);
            } else if (urlParams.get('google_error')) {
                showStatus('❌ ' + urlParams.get('google_error'), 'error');
                // Clear the URL parameter
                window.history.replaceState({}, document.title, '/calendar');
            }

            const calendarEl = document.getElementById('calendar');

            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                editable: true,
                selectable: true,
                selectMirror: true,
                dayMaxEvents: 3,
                moreLinkClick: 'popover',
                eventTimeFormat: {
                    hour: 'numeric',
                    minute: '2-digit',
                    meridiem: 'short'
                },
                events: loadEvents,
                select: function(info) {
                    openNewEventForm(info.start, info.end);
                    calendar.unselect();
                },
                eventClick: function(info) {
                    editEvent(info.event);
                },
                eventDrop: function(info) {
                    updateEventFromDrag(info.event);
                },
                eventResize: function(info) {
                    updateEventFromDrag(info.event);
                },
                eventDidMount: function(info) {
                    // Add data attributes for styling
                    info.el.setAttribute('data-source', info.event.extendedProps.source || 'user');

                    // Add tooltip
                    if (info.event.extendedProps.description) {
                        info.el.title = info.event.title + '\n' + info.event.extendedProps.description;
                    }
                },
                eventMouseEnter: function(info) {
                    info.el.style.transform = 'scale(1.02)';
                    info.el.style.zIndex = '10';
                },
                eventMouseLeave: function(info) {
                    info.el.style.transform = 'scale(1)';
                    info.el.style.zIndex = 'auto';
                },
                loading: function(isLoading) {
                    if (isLoading) {
                        calendarEl.innerHTML = '<div class="calendar-loading">Loading calendar...</div>';
                    }
                },
                height: 'auto',
                contentHeight: 600,
                aspectRatio: 1.8
            });

            calendar.render();

            // Check Google Calendar connection status
            checkGoogleCalendarStatus();

            // Event listeners
            document.getElementById('newEventBtn').addEventListener('click', () => openNewEventForm());
            document.getElementById('generateBtn').addEventListener('click', generateSchedule);
            document.getElementById('syncBtn').addEventListener('click', syncGoogleCalendar);
            document.getElementById('connectGoogleBtn').addEventListener('click', connectGoogleCalendar);
        });

        function loadEvents(fetchInfo, successCallback, failureCallback) {

            // Build URL with date range parameters
            const url = new URL('/calendar/events', window.location.origin);
            if (fetchInfo.start) {
                url.searchParams.set('start', fetchInfo.start.toISOString());
            }
            if (fetchInfo.end) {
                url.searchParams.set('end', fetchInfo.end.toISOString());
            }

            fetch(url)
                .then(response => response.json())
                .then(events => {
                    const calendarEvents = events.map(event => ({
                        id: event.eventID,
                        title: event.title,
                        start: event.startTime,
                        end: event.endTime,
                        description: event.description || '',
                        source: event.source,
                        extendedProps: {
                            source: event.source,
                            description: event.description || ''
                        }
                    }));

                    successCallback(calendarEvents);
                    hideStatus();

                    // Hide loading screen after events are loaded
                    setTimeout(() => {
                        const loadingScreen = document.getElementById('calendar-loading');
                        if (loadingScreen) {
                            loadingScreen.classList.add('is-hidden');
                        }
                    }, 500);
                })
                .catch(error => {
                    console.error('Error loading events:', error);
                    showStatus('Error loading events', 'error');
                    failureCallback(error);

                    // Hide loading screen even on error
                    setTimeout(() => {
                        const loadingScreen = document.getElementById('calendar-loading');
                        if (loadingScreen) {
                            loadingScreen.classList.add('is-hidden');
                        }
                    }, 500);
                });
        }

        function openNewEventForm(start = null, end = null) {
            currentEventId = null;
            currentEvent = null;

            document.getElementById('eventFormTitle').textContent = 'New Event';
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDescription').value = '';
            document.getElementById('deleteBtn').style.display = 'none';

            if (start && end) {
                document.getElementById('eventStart').value = formatDateTimeLocal(start);
                document.getElementById('eventEnd').value = formatDateTimeLocal(end);
            } else {
                const now = new Date();
                const startTime = new Date(now.getTime() + 60 * 60 * 1000); // 1 hour from now
                const endTime = new Date(startTime.getTime() + 60 * 60 * 1000); // 1 hour later

                document.getElementById('eventStart').value = formatDateTimeLocal(startTime);
                document.getElementById('eventEnd').value = formatDateTimeLocal(endTime);
            }

            document.getElementById('eventForm').style.display = 'block';
        }

        function editEvent(event) {
            currentEventId = event.id;
            currentEvent = event;

            document.getElementById('eventFormTitle').textContent = 'Edit Event';
            document.getElementById('eventTitle').value = event.title || '';
            document.getElementById('eventDescription').value = event.extendedProps?.description || '';
            document.getElementById('eventStart').value = formatDateTimeLocal(event.start);
            document.getElementById('eventEnd').value = formatDateTimeLocal(event.end);
            document.getElementById('deleteBtn').style.display = 'block';

            document.getElementById('eventForm').style.display = 'block';
        }

        function closeEventForm() {
            document.getElementById('eventForm').style.display = 'none';
            currentEventId = null;
            currentEvent = null;
        }

        function saveEvent() {
            const title = document.getElementById('eventTitle').value.trim();
            const description = document.getElementById('eventDescription').value.trim();
            const startTime = document.getElementById('eventStart').value;
            const endTime = document.getElementById('eventEnd').value;

            if (!title || !startTime || !endTime) {
                showStatus('Please fill in all required fields', 'error');
                // Add shake animation to empty fields
                const requiredFields = ['eventTitle', 'eventStart', 'eventEnd'];
                requiredFields.forEach(fieldId => {
                    const field = document.getElementById(fieldId);
                    if (!field.value.trim()) {
                        field.style.animation = 'shake 0.5s ease-in-out';
                        setTimeout(() => field.style.animation = '', 500);
                    }
                });
                return;
            }

            const startDate = new Date(startTime);
            const endDate = new Date(endTime);

            if (startDate >= endDate) {
                showStatus('End time must be after start time', 'error');
                return;
            }

            const eventData = {
                title,
                description,
                startTime: startDate.toISOString(),
                endTime: endDate.toISOString()
            };

            const url = currentEventId ? `/calendar/events/${currentEventId}` : '/calendar/events';
            const method = currentEventId ? 'PUT' : 'POST';

            showStatus('Saving event...', 'info');

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(eventData)
            })
            .then(response => {
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                return response.json().catch(() => ({ error: 'Invalid JSON response' }));
            })
            .then(data => {
                console.log('Response data:', data);
                if (data.error) {
                    showStatus(data.error, 'error');
                } else {
                    showStatus('Event saved successfully! ✨', 'success');
                    closeEventForm();
                    calendar.refetchEvents();
                    setTimeout(() => hideStatus(), 3000);
                }
            })
            .catch(error => {
                console.error('Error saving event:', error);
                showStatus('Error saving event', 'error');
            });
        }

        function deleteEvent() {
            if (!currentEventId || !confirm('Are you sure you want to delete this event?')) {
                return;
            }

            showStatus('Deleting event...', 'info');

            fetch(`/calendar/events/${currentEventId}`, { method: 'DELETE' })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showStatus(data.error, 'error');
                    } else {
                        showStatus('Event deleted successfully', 'success');
                        closeEventForm();
                        calendar.refetchEvents();
                    }
                })
                .catch(error => {
                    console.error('Error deleting event:', error);
                    showStatus('Error deleting event', 'error');
                });
        }

        function updateEventFromDrag(event) {
            const eventData = {
                startTime: event.start.toISOString(),
                endTime: event.end ? event.end.toISOString() : new Date(event.start.getTime() + 60 * 60 * 1000).toISOString()
            };

            showStatus('Updating event...', 'info');

            fetch(`/calendar/events/${event.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(eventData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    showStatus('Error updating event', 'error');
                    calendar.refetchEvents(); // Revert changes
                } else {
                    showStatus('Event updated successfully', 'success');
                    // Add a subtle animation effect
                    setTimeout(() => {
                        hideStatus();
                    }, 2000);
                }
            })
            .catch(error => {
                console.error('Error updating event:', error);
                showStatus('Error updating event', 'error');
                calendar.refetchEvents(); // Revert changes
            });
        }

        function generateSchedule() {
            if (!confirm('🎯 Generate schedule from pending tasks?\n\nThis will create optimized events for your unscheduled tasks.')) {
                return;
            }

            showStatus('🤖 AI is generating your optimal schedule...', 'info');

            fetch('/calendar/generate', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showStatus('❌ ' + data.error, 'error');
                    } else {
                        const message = `✅ Schedule generated! ✨\nCreated ${data.created || 0} events, ${data.failed || 0} conflicts avoided.`;
                        showStatus(message, 'success');
                        calendar.refetchEvents();
                        setTimeout(() => hideStatus(), 5000);
                    }
                })
                .catch(error => {
                    console.error('Error generating schedule:', error);
                    showStatus('❌ Error generating schedule', 'error');
                });
        }

        function syncGoogleCalendar() {
            showStatus('🔄 Syncing with Google Calendar...', 'info');

            fetch('/calendar/sync/google', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        showStatus('❌ ' + data.error, 'error');
                    } else {
                        const imported = data.imported || 0;
                        const skipped = data.skipped || 0;
                        let message = '✅ Google Calendar synced successfully! 🎉';
                        
                        if (imported > 0) {
                            message += `\n📅 Imported ${imported} events`;
                            if (skipped > 0) {
                                message += `, skipped ${skipped} duplicates`;
                            }
                        } else if (skipped > 0) {
                            message += `\n📅 All ${skipped} events already up to date`;
                        } else {
                            message += '\n📅 No new events to import';
                        }
                        
                        showStatus(message, 'success');
                        calendar.refetchEvents();
                        // Update button state after sync
                        checkGoogleCalendarStatus();
                        setTimeout(() => hideStatus(), 5000);
                    }
                })
                .catch(error => {
                    console.error('Error syncing Google Calendar:', error);
                    showStatus('❌ Error syncing Google Calendar', 'error');
                });
        }

        function checkGoogleCalendarStatus() {
            fetch('/calendar/check-google-auth')
                .then(response => response.json())
                .then(data => {
                    const syncBtn = document.getElementById('syncBtn');
                    const connectBtn = document.getElementById('connectGoogleBtn');
                    
                    if (data.connected) {
                        syncBtn.style.display = 'block';
                        connectBtn.style.display = 'none';
                    } else {
                        syncBtn.style.display = 'none';
                        connectBtn.style.display = 'block';
                    }
                })
                .catch(error => {
                    console.error('Error checking Google Calendar status:', error);
                    document.getElementById('connectGoogleBtn').style.display = 'block';
                });
        }

        function connectGoogleCalendar() {
            showStatus('🔗 Redirecting to Google for authentication...', 'info');
            window.location.href = '/auth/google';
        }

        function formatDateTimeLocal(date) {
            if (!date) return '';
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${year}-${month}-${day}T${hours}:${minutes}`;
        }

        let statusTimeout = null;

        function showStatus(message, type = 'info') {
            const el = document.getElementById('status');
            
            // Clear any existing timeout
            if (statusTimeout) {
                clearTimeout(statusTimeout);
            }
            
            el.textContent = message;
            el.className = `status ${type}`;
            el.style.display = 'block';
            
            // Set appropriate timeout based on message type
            let timeoutDuration = 5000; // default 5 seconds
            if (type === 'success') {
                timeoutDuration = 3000; // 3 seconds for success
            } else if (type === 'error') {
                timeoutDuration = 6000; // 6 seconds for errors
            } else if (type === 'info') {
                timeoutDuration = 4000; // 4 seconds for info
            }
            
            statusTimeout = setTimeout(() => hideStatus(), timeoutDuration);
        }

        function hideStatus() {
            const el = document.getElementById('status');
            el.classList.add('hiding');
            setTimeout(() => {
                el.style.display = 'none';
                el.classList.remove('hiding');
            }, 300); // Match the animation duration
            if (statusTimeout) {
                clearTimeout(statusTimeout);
                statusTimeout = null;
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('eventForm');
            if (event.target == modal) {
                closeEventForm();
            }
        };
    </script>
</body>
</html>
