<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up - Dusty</title>
    <link rel="icon" href="{{ url_for('static', filename='images/mainicon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/dusty.js') }}"></script>
</head>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(err => console.error('SW failed', err));
    }
</script>
<body>
    <div class="auth-logo" aria-hidden="true">
        <img id="logo" src="{{ url_for('static', filename='images/transp512.png') }}" alt="Logo" />
    </div>

    <main class="login-box" role="main" aria-labelledby="signupTitle">
        <h1 id="signupTitle">Create an account</h1>

        <form id="signupForm" autocomplete="on" method="post"
              action="{{ url_for('add_user') }}" novalidate
              onsubmit="return validateSignup(event)">

            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text"
                       required minlength="3" placeholder="yourname" />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" name="email" type="email"
                       required placeholder="name@example.com" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password"
                       required minlength="8" placeholder="••••••••" />
                <span class="field-hint">At least 8 characters</span>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm password</label>
                <input id="confirmPassword" name="confirmPassword" type="password"
                       required minlength="8" placeholder="••••••••" />
            </div>

            <p id="signupError" style="color:#ff6b6b;font-size:13px;margin-bottom:8px;min-height:18px"></p>

            <div class="actions">
                <button type="submit">Create account</button>
            </div>
            
            <p class="muted">
                Already have an account?
                <a class="small-link" href="{{ url_for('login') }}">Sign in</a>
            </p>
        </form>
    </main>

    <script>
        function validateSignup(e) {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            const errorEl = document.getElementById('signupError');

            // Validate username
            if (!username || username.length < 3) {
                e.preventDefault();
                errorEl.textContent = 'Username must be at least 3 characters.';
                return false;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                e.preventDefault();
                errorEl.textContent = 'Please enter a valid email address.';
                return false;
            }

            // Validate password length
            if (!pw || pw.length < 8) {
                e.preventDefault();
                errorEl.textContent = 'Password must be at least 8 characters.';
                return false;
            }

            // Validate password match
            if (pw !== cpw) {
                e.preventDefault();
                errorEl.textContent = 'Passwords do not match.';
                return false;
            }

            return true;
        }

        // Show server-side errors from URL params
        const params = new URLSearchParams(window.location.search);
        const errorEl = document.getElementById('signupError');
        if (errorEl) {
            if (params.get('error') === 'email_exists')
                errorEl.textContent = 'An account with this email already exists.';
            else if (params.get('error') === 'missing_fields')
                errorEl.textContent = 'Please fill in all required fields.';
            else if (params.get('error') === 'invalid_email')
                errorEl.textContent = 'Please enter a valid email address.';
            else if (params.get('error') === 'invalid_username')
                errorEl.textContent = 'Username must be at least 3 characters.';
            else if (params.get('error') === 'weak_password')
                errorEl.textContent = 'Password must be at least 8 characters.';
        }

        // Parallax logo
        (function () {
            const logo = document.getElementById('logo');
            if (!logo) return;
            const maxPixels = 5;
            let raf = null;
            function onMove(x, y) {
                const cx = window.innerWidth / 2;
                const cy = window.innerHeight / 2;
                logo.style.transform = `translate3d(${(x - cx) / cx * maxPixels}px, ${(y - cy) / cy * maxPixels}px, 0)`;
            }
            function handle(e) {
                const x = e.touches ? e.touches[0].clientX : e.clientX;
                const y = e.touches ? e.touches[0].clientY : e.clientY;
                if (raf) cancelAnimationFrame(raf);
                raf = requestAnimationFrame(() => onMove(x, y));
            }
            window.addEventListener('mousemove', handle, { passive: true });
            window.addEventListener('touchmove',  handle, { passive: true });
            window.addEventListener('mouseleave', () => { logo.style.transform = 'translate3d(0,0,0)'; });
        })();
    </script>
</body>
</html>
