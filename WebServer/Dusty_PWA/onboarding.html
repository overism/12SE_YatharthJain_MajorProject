<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to Dusty</title>
    <link rel="icon" href="{{ url_for('static', filename='images/mainicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <style>
        body {
            background:
                linear-gradient(rgba(196, 49, 4, 0.45), rgba(0,0,0,0.45)),
                url("/static/images/signupbg.jpg") center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
    </style>
</head>
<body>
    <script defer src="{{ url_for('static', filename='js/subject-colours.js') }}"></script>
    <script defer src="{{ url_for('static', filename='js/dusty.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (typeof openPrefsModal === 'function') {
                    openPrefsModal();
                }
            }, 300);
        });

        // Override skipPrefs to go to home from onboarding page
        function skipPrefs() {
            window.location.href = '/home';
        }
    </script>
</body>
</html>
