<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Dashboard - Gamify</title>
        <link rel="icon" href="{{ url_for('static', filename='images/mainicon.png') }}">
        <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
        <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    </head>
    <script>
        if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js')
            .then(() => console.log('SW registered'))
            .catch(err => console.error('SW failed', err));
        }
    </script>
    <body>
        <sidebar class="sidebar" role="banner">
            <a class="brand" href="{{ url_for('home') }}" aria-label="Gamify home">
                <img src="{{ url_for('static', filename='images/transp512.png') }}" alt="Gamify logo">
            </a>
            <nav class="nav" role="navigation" aria-label="Auth pages">
                <a class="btn btn-ghost" href="{{ url_for('home') }}">Dashboard</a>
                <a class="btn btn-ghost" href="{{ url_for('calendar') }}">Smart Calendar</a>
                <a class="btn btn-ghost" href="{{ url_for('tasks') }}">Tasks</a>
                <a class="btn btn-ghost" href="{{ url_for('timer') }}">Study Timer</a>
                <a class="btn btn-ghost" href="{{ url_for('chat') }}">AI Assistant</a>
                <a class="btn btn-active" href="{{ url_for('flashcards') }}">Flashcards</a>
                <a class="btn btn-ghost" href="{{ url_for('progress') }}">Progress</a>
                <a class="btn btn-ghost" href="{{ url_for('resources') }}">Resources</a>
            </nav>
        </sidebar>
