<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Gamify</title>
    <link rel="icon" href="{{ url_for('static', filename='images/mainicon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  </head>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('SW registered'))
        .catch(err => console.error('SW failed', err));
    }
  </script>
  <body>
    <div class="auth-logo" aria-hidden="true">
      <img id="logo" src="{{ url_for('static', filename='images/transp512.png') }}" alt="Logo" />
    </div>

    <main class="login-box" role="main" aria-labelledby="loginTitle">
      <h1 id="loginTitle">Sign In to DustyAI</h1>

      <form id="loginForm" autocomplete="off" method="post" action="{{ url_for('login_validation') }}" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required minlength="3" placeholder="yourname" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" required placeholder="name@example.com" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required minlength="6" placeholder="••••••••" />
        </div>

        <p id="loginError" style="color:#ff6b6b;font-size:13px;margin-bottom:8px;min-height:18px"></p>

        <div class="actions">
          <button type="submit" value="login">Sign in</button>
        </div>

        <p class="muted">Don't have an account? <a class="small-link" href="{{ url_for('signup') }}">Sign up</a></p>
      </form>

    </main>

    <script>
      // parallax behaviour for logo
      (function(){
        const logo = document.getElementById('logo');
        if (!logo) return;
        const maxPixels = 5;
        let raf = null;
        function onMove(clientX, clientY){
          const cx = window.innerWidth / 2;
          const cy = window.innerHeight / 2;
          const nx = (clientX - cx) / cx;
          const ny = (clientY - cy) / cy;
          const tx = nx * maxPixels;
          const ty = ny * maxPixels;
          logo.style.transform = `translate3d(${tx}px, ${ty}px, 0)`;
        }
        function handlePointer(e){
          const x = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
          const y = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(()=> onMove(x,y));
        }
        function reset(){ if (raf) cancelAnimationFrame(raf); logo.style.transform = 'translate3d(0,0,0)'; }
        window.addEventListener('mousemove', handlePointer, {passive:true});
        window.addEventListener('pointermove', handlePointer, {passive:true});
        window.addEventListener('touchmove', handlePointer, {passive:true});
        window.addEventListener('mouseleave', reset);
        window.addEventListener('pointerleave', reset);
        window.addEventListener('blur', reset);
      })();

      // Show server-side errors
      const loginParams = new URLSearchParams(window.location.search);
      const loginErrEl  = document.getElementById('loginError');
      if (loginErrEl) {
          if (loginParams.get('error') === 'invalid_credentials')
              loginErrEl.textContent = 'Incorrect email or password.';
          else if (loginParams.get('error') === 'session_expired')
              loginErrEl.textContent = 'Your session expired. Please sign in again.';
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(()=>{});
      }
    </script>
    <script src="{{ url_for('static', filename='js/dusty.js') }}"></script>
  </body>
</html>
